<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>OX 상식퀴즈</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #1a1a2e; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Noto Sans KR', sans-serif;
            touch-action: manipulation; -webkit-touch-callout: none;
            -webkit-user-select: none; user-select: none;
            position: fixed; top: 0; left: 0;
        }
        body { display: flex; justify-content: center; align-items: center; }

        /* 게임 컨테이너 */
        #game-container {
            width: 100%; height: 100%; display: none; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
            position: relative;
        }
        #info-bar {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: rgba(0,0,0,0.3);
        }
        #info-bar .lives { font-size: 20px; }
        #info-bar .progress { color: #aaa; font-size: 14px; }
        #info-bar .score { color: #0ff; font-size: 16px; font-weight: bold; }
        #category-label {
            position: absolute; top: 48px; left: 20px;
            color: #888; font-size: 12px;
        }
        #question-area {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; max-width: 700px; padding: 20px; padding-top: 50px;
        }
        #question-number { color: #888; font-size: 14px; margin-bottom: 8px; }
        #question-text {
            color: #fff; font-size: clamp(18px, 4vw, 28px); text-align: center;
            line-height: 1.6; padding: 16px; min-height: 80px;
            display: flex; align-items: center; justify-content: center;
        }
        #explanation {
            color: #ff0; font-size: 13px; margin-top: 12px; text-align: center;
            min-height: 20px; padding: 0 20px; opacity: 0; transition: opacity 0.3s;
        }
        #explanation.show { opacity: 1; }

        /* O X 버튼 */
        #buttons { display: flex; gap: 30px; margin-top: 20px; }
        .ox-btn {
            width: clamp(90px, 18vw, 140px); height: clamp(90px, 18vw, 140px);
            border-radius: 50%; border: 4px solid; font-size: clamp(36px, 7vw, 60px);
            font-weight: bold; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: transform 0.1s, box-shadow 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .ox-btn:active { transform: scale(0.92); }
        #btn-o {
            background: rgba(0, 180, 100, 0.15); border-color: #0b4;
            color: #0e6; box-shadow: 0 0 20px rgba(0,180,100,0.2);
        }
        #btn-x {
            background: rgba(220, 50, 50, 0.15); border-color: #d33;
            color: #f44; box-shadow: 0 0 20px rgba(220,50,50,0.2);
        }
        /* 피드백 - 버튼 위 */
        #feedback {
            position: absolute; bottom: calc(clamp(90px, 18vw, 140px) + 50px);
            left: 50%; transform: translateX(-50%);
            font-size: 56px; pointer-events: none; opacity: 0;
            transition: opacity 0.3s; z-index: 100;
        }
        #feedback.show { opacity: 1; }
        .disabled { pointer-events: none; opacity: 0.5; }

        /* 타이틀/분야 선택 화면 */
        #title-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #1a1a2e; z-index: 50; padding: 20px; overflow-y: auto;
        }
        #title-screen h1 {
            font-size: clamp(28px, 6vw, 48px); color: #fff; margin-bottom: 6px;
            text-shadow: 0 0 20px #0ff;
        }
        #title-screen .subtitle { color: #888; font-size: 14px; margin-bottom: 16px; }
        #title-screen .rules {
            color: #aaa; font-size: 13px; line-height: 1.8; text-align: center;
            margin-bottom: 16px;
        }
        .category-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; width: 100%; max-width: 600px; padding: 0 10px;
        }
        @media (max-width: 500px) {
            .category-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .cat-btn {
            padding: 14px 8px; border-radius: 12px; border: 2px solid #333;
            background: rgba(255,255,255,0.03); color: #fff; cursor: pointer;
            text-align: center; font-size: 12px; transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .cat-btn:hover, .cat-btn:active {
            border-color: #0ff; background: rgba(0,255,255,0.08);
            transform: scale(1.03);
        }
        .cat-btn .icon { font-size: 28px; display: block; margin-bottom: 4px; }

        /* 결과 화면 */
        #result-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: #1a1a2e; z-index: 50; padding: 20px;
        }
        #result-screen h2 { font-size: 32px; margin-bottom: 16px; }
        #result-screen .stats { color: #aaa; font-size: 16px; line-height: 2; text-align: center; margin-bottom: 24px; }
        #retry-btn {
            padding: 14px 40px; font-size: 18px; background: linear-gradient(135deg, #f80, #f40);
            color: #fff; border: none; border-radius: 30px; cursor: pointer;
            font-weight: bold; -webkit-tap-highlight-color: transparent;
        }
        #retry-btn:active { transform: scale(0.95); }

        /* 뮤트 버튼 */
        #mute-btn {
            position: fixed; top: 12px; right: 16px; width: 36px; height: 36px;
            border-radius: 50%; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2); color: #fff;
            font-size: 18px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 60;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 분야 선택 화면 -->
    <div id="title-screen">
        <h1>⭕❌ 상식퀴즈</h1>
        <div class="subtitle">분야를 선택하세요!</div>
        <div class="rules">
            ❤️ 목숨 5개 — 5번 틀리면 게임 오버!<br>
            🏆 모든 문제를 통과하면 클리어!
        </div>
        <div class="category-grid">
            <div class="cat-btn" onclick="selectCategory('science')"><span class="icon">🔬</span>과학</div>
            <div class="cat-btn" onclick="selectCategory('geography')"><span class="icon">🌍</span>지리</div>
            <div class="cat-btn" onclick="selectCategory('history')"><span class="icon">📜</span>역사</div>
            <div class="cat-btn" onclick="selectCategory('culture')"><span class="icon">🎨</span>문화/예술</div>
            <div class="cat-btn" onclick="selectCategory('daily')"><span class="icon">💡</span>생활상식</div>
            <div class="cat-btn" onclick="selectCategory('tech')"><span class="icon">💻</span>IT/기술</div>
            <div class="cat-btn" onclick="selectCategory('animal')"><span class="icon">🐾</span>동물/자연</div>
            <div class="cat-btn" onclick="selectCategory('korea')"><span class="icon">🇰🇷</span>한국상식</div>
            <div class="cat-btn" onclick="selectCategory('food')"><span class="icon">🍽️</span>음식/요리</div>
            <div class="cat-btn" onclick="selectCategory('body')"><span class="icon">🏥</span>인체/건강</div>
            <div class="cat-btn" onclick="selectCategory('math')"><span class="icon">🔢</span>수학/논리</div>
            <div class="cat-btn" onclick="selectCategory('entertainment')"><span class="icon">⭐</span>연예/엔터</div>
            <div class="cat-btn" onclick="selectCategory('sports')"><span class="icon">⚽</span>스포츠</div>
            <div class="cat-btn" onclick="selectCategory('adult')"><span class="icon">🍺</span>성인상식</div>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-container">
        <div id="info-bar">
            <div class="lives" id="lives">❤️❤️❤️❤️❤️</div>
            <div class="progress" id="progress">1 / 20</div>
            <div class="score" id="score">0점</div>
        </div>
        <div id="category-label"></div>
        <div id="question-area">
            <div id="question-number">Q1.</div>
            <div id="question-text">문제가 여기에 표시됩니다</div>
            <div id="explanation"></div>
        </div>
        <div id="buttons">
            <div class="ox-btn" id="btn-o" onclick="answer(true)">O</div>
            <div class="ox-btn" id="btn-x" onclick="answer(false)">X</div>
        </div>
        <div id="feedback"></div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen">
        <h2 id="result-title">GAME OVER</h2>
        <div class="stats" id="result-stats"></div>
        <button id="retry-btn" onclick="showTitle()">다시 하기</button>
    </div>

    <!-- 뮤트 버튼 -->
    <div id="mute-btn" onclick="toggleMute()">🔊</div>

    <script src="questions/science.js"></script>
    <script src="questions/geography.js"></script>
    <script src="questions/history.js"></script>
    <script src="questions/culture.js"></script>
    <script src="questions/daily.js"></script>
    <script src="questions/tech.js"></script>
    <script src="questions/animal.js"></script>
    <script src="questions/korea.js"></script>
    <script src="questions/food.js"></script>
    <script src="questions/body.js"></script>
    <script src="questions/math.js"></script>
    <script src="questions/entertainment.js"></script>
    <script src="questions/sports.js"></script>
    <script src="questions/adult.js"></script>
    <script src="sound.js"></script>
    <script src="game.js"></script>
</body>
</html>
