<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>★ GRADIUS TRIBUTE ★</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', monospace;
            touch-action: none; -webkit-touch-callout: none;
            -webkit-user-select: none; user-select: none;
        }
        body { display: flex; justify-content: center; align-items: center; }
        #gameCanvas { display: block; background: #000; }
        #ui-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: #fff; display: none; z-index: 10;
            width: 90%; max-width: 480px;
        }
        #ui-overlay h1 {
            font-size: 32px; color: #0ff; margin-bottom: 10px;
            text-shadow: 0 0 20px #0ff, 0 0 40px #08f; letter-spacing: 4px;
        }
        #ui-overlay .subtitle {
            font-size: 14px; color: #f80; margin-bottom: 15px;
            text-shadow: 0 0 10px #f80;
        }
        #ui-overlay p { font-size: 13px; margin-bottom: 6px; color: #aaf; }
        #ui-overlay .blink {
            animation: blink 1s infinite; color: #ff0;
            font-size: 16px; margin-top: 15px;
        }
        #ui-overlay .controls-info {
            background: rgba(0,255,255,0.03); border: 1px solid #0ff3;
            border-radius: 8px; padding: 12px; margin: 10px 0;
            font-size: 12px; line-height: 2;
        }
        @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
        #score-screen {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            color: #fff; z-index: 15; width: 90%; max-width: 480px;
        }
        #mute-btn, #pause-btn {
            position: absolute; top: 10px; width: 36px; height: 36px;
            border-radius: 50%; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2); color: #fff;
            font-size: 18px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 30;
            -webkit-tap-highlight-color: transparent;
        }
        #mute-btn { right: 10px; }
        #pause-btn { right: 52px; }
        .power-gauge {
            display: flex; gap: 2px; justify-content: center;
            margin-top: 8px;
        }
        .power-gauge span {
            padding: 2px 6px; font-size: 10px; border: 1px solid #444;
            color: #666; border-radius: 2px;
        }
        .power-gauge span.active { border-color: #f80; color: #f80; background: #f802; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay">
        <h1>GRADIUS</h1>
        <div class="subtitle">— TRIBUTE EDITION —</div>
        <div class="controls-info">
            🎮 PC: ← → ↑ ↓ 이동 | 자동 발사 | M 뮤트 | P 일시정지<br>
            📱 모바일: 드래그로 이동 (상하좌우)
        </div>
        <p>파워업 캡슐을 먹으면 자동으로 강화됩니다!</p>
        <p style="font-size:11px; color:#888; margin-top:5px;">
            <span style="color:#0f0">S</span>=스피드 
            <span style="color:#f80">M</span>=미사일 
            <span style="color:#0ff">P</span>=파워 
            <span style="color:#f0f">L</span>=레이저 
            <span style="color:#ff0">O</span>=옵션 
            <span style="color:#48f">?</span>=실드
        </p>
        <p style="margin-top:10px;">매 5스테이지 보스 등장!</p>
        <p class="blink">TAP OR PRESS SPACE TO START</p>
        <div id="title-scores" style="margin-top:10px;"></div>
    </div>
    <div id="score-screen">
        <h2 style="color:#f44; font-size:26px; margin-bottom:8px; text-shadow:0 0 10px #f44;">GAME OVER</h2>
        <p id="final-score" style="color:#ff0; font-size:16px; margin-bottom:12px;"></p>
        <div id="name-input-area" style="margin-bottom:12px;">
            <input id="player-name" type="text" maxlength="8" placeholder="이름 입력"
                style="background:#111; border:2px solid #0ff; color:#0ff; padding:6px 10px; font-size:14px; text-align:center; font-family:'Courier New',monospace; width:130px; border-radius:4px;">
            <button id="save-score-btn" onclick="saveScore()" ontouchend="event.preventDefault(); saveScore();"
                style="background:#0ff; color:#000; border:none; padding:6px 14px; font-size:13px; font-family:'Courier New',monospace; cursor:pointer; border-radius:4px; margin-left:4px; font-weight:bold;">저장</button>
        </div>
        <div style="display:flex; gap:8px; justify-content:center;">
            <div style="flex:1; background:rgba(255,255,255,0.05); border:1px solid #333; border-radius:6px; padding:8px;">
                <h3 style="color:#0f0; font-size:12px; margin-bottom:6px;">📅 오늘 TOP 20</h3>
                <div id="today-scores" style="font-size:11px; line-height:1.8; max-height:300px; overflow-y:auto;"></div>
            </div>
            <div style="flex:1; background:rgba(255,255,255,0.05); border:1px solid #333; border-radius:6px; padding:8px;">
                <h3 style="color:#f80; font-size:12px; margin-bottom:6px;">🏆 전체 TOP 20</h3>
                <div id="all-scores" style="font-size:11px; line-height:1.8; max-height:300px; overflow-y:auto;"></div>
            </div>
        </div>
        <p style="color:#0ff; margin-top:12px; animation:blink 1s infinite; font-size:13px;">TAP OR PRESS SPACE TO RESTART</p>
    </div>
    <div id="mute-btn" onclick="toggleMute()" ontouchend="event.preventDefault(); toggleMute();">🔊</div>
    <div id="pause-btn" onclick="togglePause()" ontouchend="event.preventDefault(); togglePause();">⏸</div>
    <script src="sound.js"></script>
    <script src="game.js"></script>
</body>
</html>
